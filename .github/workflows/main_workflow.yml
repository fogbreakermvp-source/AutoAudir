name: AuditAutoPro 2026 Pipeline

on:
  schedule:
    - cron: '*/30 * * * *' # Every 30 minutes for 10k/day throughput
  workflow_dispatch: 

jobs:
  run-audit:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v3
      with:
        persist-credentials: true

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        # Headless Chrome & Drivers
        sudo apt-get update
        sudo apt-get install -y google-chrome-stable libnss3 libatk1.0-0 libatk-bridge2.0-0 libcups2 libdrm2 libxkbcommon0 libcomposite1 libasound2 libgbm1

    - name: Run Pipeline
      run: python main.py
      env:
        PYTHONPATH: .

    - name: Commit-Back Strategy (Persistence)
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "Elite Audit Bot"
        git add data/audit_leads.db
        git commit -m "Cloud Sync: Accumulated Leads [skip ci]" || echo "No changes to sync"
        git push origin main
