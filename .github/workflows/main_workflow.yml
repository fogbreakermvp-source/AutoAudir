name: AuditAutoPro 2026 Pipeline

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch: 

jobs:
  run-audit:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        persist-credentials: true

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Pipeline
      run: python main.py
      env:
        PYTHONPATH: .

    - name: Commit-Back Strategy (Persistence)
      if: always()
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "Elite Audit Bot"
        git add -f data/audit_leads.db logs/ data/proofs/ || true
        git diff --cached --quiet || git commit -m "Cloud Sync: $(date +%Y-%m-%d_%H:%M) [skip ci]"
        git push origin main || true
